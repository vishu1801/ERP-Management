spring.application.name=API-GATEWAY

eureka.client.service-url.defaultZone: http://localhost:8761/eureka
eureka.client.register-with-eureka: true
eureka.client.fetch-registry: true

# ??? Global CORS Configuration ????????????????????????????????????????????????
spring.cloud.gateway.server.webflux.globalcors.add-to-simple-url-handler-mapping=true
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-origin-patterns=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allow-credentials=true
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].max-age=3600

#Auth Service Routes
spring.cloud.gateway.server.webflux.routes[0].id= AUTH-SERVICE
spring.cloud.gateway.server.webflux.routes[0].uri= lb://AUTH-SERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/auth/**
spring.cloud.gateway.server.webflux.routes[0].filters[0] = AuthenticationFilter

#Student Service Routes
spring.cloud.gateway.server.webflux.routes[1].id= STUDENT-SERVICE
spring.cloud.gateway.server.webflux.routes[1].uri= lb://STUDENT-SERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/v1/student/**
spring.cloud.gateway.server.webflux.routes[1].filters[0] = AuthenticationFilter

