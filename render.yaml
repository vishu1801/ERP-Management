services:

  # ── Discovery Service (Eureka) ───────────────────────────────────────────────
  - type: web
    name: erp-discovery
    runtime: docker
    dockerfilePath: ./discovery-service/Dockerfile
    dockerContext: ./discovery-service
    plan: free
    envVars:
      - key: EUREKA_INSTANCE_HOSTNAME
        value: erp-discovery.onrender.com

  # ── Auth Service ─────────────────────────────────────────────────────────────
  - type: web
    name: erp-auth
    runtime: docker
    dockerfilePath: ./authService/Dockerfile
    dockerContext: ./authService
    plan: free
    envVars:
      - key: DB_URL
        value: jdbc:postgresql://dpg-d6rvor4r85hc738lrlpg-a.oregon-postgres.render.com:5432/auth_db_2mp4
      - key: DB_USERNAME
        value: postgre
      - key: DB_PASSWORD
        value: PG6ANGon8Qbmf0G1Ek5PO5nqJrp0tjQw
      - key: EUREKA_URL
        value: https://erp-discovery.onrender.com/eureka
      - key: RENDER_HOSTNAME
        value: erp-auth.onrender.com

  # ── Student Information Service ──────────────────────────────────────────────
  - type: web
    name: erp-student
    runtime: docker
    dockerfilePath: ./studentInformationSystem/Dockerfile
    dockerContext: ./studentInformationSystem
    plan: free
    envVars:
      - key: DB_URL
        sync: false   # Set this in Render dashboard
      - key: DB_USERNAME
        sync: false   # Set this in Render dashboard
      - key: DB_PASSWORD
        sync: false   # Set this in Render dashboard
      - key: EUREKA_URL
        value: https://erp-discovery.onrender.com/eureka
      - key: RENDER_HOSTNAME
        value: erp-student.onrender.com

  # ── API Gateway ───────────────────────────────────────────────────────────────
  - type: web
    name: erp-gateway
    runtime: docker
    dockerfilePath: ./api-gateway/Dockerfile
    dockerContext: ./api-gateway
    plan: free
    envVars:
      - key: EUREKA_URL
        value: https://erp-discovery.onrender.com/eureka
      - key: AUTH_SERVICE_URL
        value: https://erp-auth.onrender.com
